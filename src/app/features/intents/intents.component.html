<main class="intents-main" [class.panel-open]="selectedIntent()">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Intent Registry</h1>
      <p class="page-subtitle">Manage conversational AI intents, routing strategies, authentication requirements, and training examples.</p>
    </div>
    <div class="header-actions">
      <ui-button variant="outline" size="sm" (click)="onReloadRegistry()">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Reload Registry
      </ui-button>
      <ui-button variant="outline" size="sm" (click)="onFullRefresh()">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
        </svg>
        Full Refresh
      </ui-button>
      <ui-button variant="primary" size="sm" (click)="onNewIntent()">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/>
          <path d="M12 5v14"/>
        </svg>
        New Intent
      </ui-button>
    </div>
  </div>

  <!-- Stats Cards -->
  <app-intents-stats />

  <!-- Scroll container — no padding so scrollbar reaches right edge -->
  <div class="table-scroll-area">

  <!-- Table Section -->
  <div class="table-section">
    <div class="table-card">
      <!-- Toolbar -->
      <app-intents-toolbar
        [searchQuery]="searchQuery()"
        [intentsCount]="filteredIntents().length"
        [domainOptions]="intentService.domainOptions()"
        [activeFilterCount]="activeFilterCount()"
        [appliedFilters]="appliedFilters()"
        (searchChange)="onSearchChange($event)"
        (filterApply)="onFilterApply($event)"
        (filterReset)="onFilterReset()"
        (exportCsv)="onExportCsv()"
      />

      <!-- Table + Pagination -->
      <app-intents-table
        [intents]="pagedIntents()"
        [currentPage]="currentPage()"
        [totalPages]="totalPages()"
        [pageNumbers]="pageNumbers()"
        [pageSize]="pageSize()"
        [pageStart]="pageStart()"
        [pageEnd]="pageEnd()"
        [totalCount]="filteredIntents().length"
        [loading]="intentService.loading()"
        [error]="intentService.error()"
        (rowClick)="onRowClick($event)"
        (editClick)="onEditClick($event)"
        (deleteClick)="onDeleteClick($event)"
        (viewDetails)="onViewDetails($event)"
        (toggleStatus)="onToggleStatus($event)"
        (duplicateIntent)="onDuplicateIntent($event)"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)"
      />
    </div>
  </div>

  </div><!-- end table-scroll-area -->
</main>

<!-- Intent Detail Panel -->
@if (selectedIntent()) {
  <app-intent-detail-panel
    [intent]="selectedIntent()!"
    (close)="selectedIntent.set(null)"
    (edit)="onEditClick(selectedIntent()!)"
    (deleteExample)="onDeleteExample($event)"
    (addExample)="onAddExample($event)"
  />
}

<!-- Edit Intent Modal -->
@if (editModalIntent()) {
  <app-intent-modal
    [intent]="editModalIntent()"
    [loading]="editLoading()"
    (save)="onEditSave($event)"
    (close)="closeEditModal()"
  />
}

<!-- New Intent Modal -->
@if (newModalOpen()) {
  <app-intent-modal
    [intent]="null"
    [loading]="newModalLoading()"
    (save)="onNewIntentSave($event)"
    (close)="closeNewModal()"
  />
}

<!-- Save error toast -->
@if (saveError()) {
  <div class="save-error-toast" (click)="saveError.set(null)">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    {{ saveError() }}
  </div>
}
